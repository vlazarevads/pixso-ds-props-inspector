<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Component Props Inspector</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background: #fff;
        color: #111;
      }

      .app {
        padding: 16px;
      }

      .title {
        margin: 0 0 12px;
        font-size: 18px;
      }

      .actions {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }

      button {
        padding: 8px 10px;
        cursor: pointer;
      }

      .meta {
        font-size: 12px;
        color: #555;
        margin-bottom: 12px;
        line-height: 1.5;
      }

      .table-wrap {
        background: #f4f4f4;
        border-radius: 8px;
        padding: 8px;
        max-height: 320px;
        overflow: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
        background: #fff;
      }

      th,
      td {
        border: 1px solid #ddd;
        padding: 8px;
        vertical-align: top;
        text-align: left;
      }

      th {
        background: #f0f0f0;
        position: sticky;
        top: 0;
        z-index: 1;
      }

      .empty {
        font-size: 12px;
        color: #666;
        padding: 12px;
      }

      .status {
        font-size: 12px;
        color: #666;
        margin-top: 8px;
      }

      .status-ok td:last-child,
      .status-ok td:nth-last-child(2) {
        background: #eaf7ea;
      }

      .status-review td:last-child,
      .status-review td:nth-last-child(2) {
        background: #fff6dd;
      }

      .status-wrong_case td:last-child,
      .status-wrong_case td:nth-last-child(2) {
        background: #ffe9cc;
      }

      .status-unknown td:last-child,
      .status-unknown td:nth-last-child(2) {
        background: #fdeaea;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <h3 class="title">Component Props Inspector</h3>

      <div class="actions">
        <button id="inspectBtn">Inspect component</button>
        <button id="copyJsonBtn">Copy JSON</button>
        <button id="copyTableBtn">Copy Table</button>
        <button id="generateDocBtn">Generate documentation</button>
      </div>

      <div id="meta" class="meta">Нажмите Inspect component</div>

      <div class="table-wrap">
        <div id="tableContainer" class="empty">Таблица пока не построена</div>
      </div>

      <div id="status" class="status"></div>
    </div>
    <script src="./index.js"></script>
  </body>
</html>
