<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Component Props Inspector</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background: #fff;
        color: #111;
      }

      .app {
        padding: 16px;
      }

      .title {
        margin: 0 0 12px;
        font-size: 18px;
      }

      .actions {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }

      button {
        padding: 8px 10px;
        cursor: pointer;
      }

      .meta {
        font-size: 12px;
        color: #555;
        margin-bottom: 12px;
        line-height: 1.5;
      }

      .table-wrap {
        background: #f4f4f4;
        border-radius: 8px;
        padding: 8px;
        max-height: 320px;
        overflow: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
        background: #fff;
      }

      th,
      td {
        border: 1px solid #ddd;
        padding: 8px;
        vertical-align: top;
        text-align: left;
      }

      th {
        background: #f0f0f0;
        position: sticky;
        top: 0;
        z-index: 1;
      }

      .empty {
        font-size: 12px;
        color: #666;
        padding: 12px;
      }

      .status {
        font-size: 12px;
        color: #666;
        margin-top: 8px;
      }

      .status-ok td:last-child,
      .status-ok td:nth-last-child(2) {
        background: #eaf7ea;
      }

      .status-review td:last-child,
      .status-review td:nth-last-child(2) {
        background: #fff6dd;
      }

      .status-wrong_case td:last-child,
      .status-wrong_case td:nth-last-child(2) {
        background: #ffe9cc;
      }

      .status-unknown td:last-child,
      .status-unknown td:nth-last-child(2) {
        background: #fdeaea;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <h3 class="title">Component Props Inspector</h3>

      <div class="actions">
        <button id="inspectBtn">Inspect component</button>
        <button id="copyJsonBtn">Copy JSON</button>
        <button id="copyTableBtn">Copy Table</button>
      </div>

      <div id="meta" class="meta">Нажмите Inspect component</div>

      <div class="table-wrap">
        <div id="tableContainer" class="empty">Таблица пока не построена</div>
      </div>

      <div id="status" class="status"></div>
    </div>

    <script>
      let lastResult = null;

      const metaEl = document.getElementById("meta");
      const tableContainer = document.getElementById("tableContainer");
      const statusEl = document.getElementById("status");
      const inspectBtn = document.getElementById("inspectBtn");
      const copyJsonBtn = document.getElementById("copyJsonBtn");
      const copyTableBtn = document.getElementById("copyTableBtn");

      inspectBtn.onclick = () => {
        statusEl.textContent = "";

        parent.postMessage(
          { pluginMessage: { type: "inspect" } },
          "*"
        );
      };

      copyJsonBtn.onclick = () => {
        if (!lastResult) {
          statusEl.textContent = "Сначала нажмите Inspect";
          return;
        }

        copyText(JSON.stringify(lastResult, null, 2));
        statusEl.textContent = "JSON скопирован";
      };

      copyTableBtn.onclick = () => {
        if (!lastResult) {
          statusEl.textContent = "Сначала нажмите Inspect";
          return;
        }

        copyText(buildMarkdownTable(lastResult.props || []));
        statusEl.textContent = "Таблица скопирована";
      };

      window.onmessage = (event) => {
        const msg = event.data.pluginMessage;
        if (!msg) return;

        if (msg.type === "result") {
          lastResult = msg.data;
          renderMeta(msg.data);
          renderTable(msg.data);
          statusEl.textContent = "";
        }
      };

      function copyText(text) {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        document.body.removeChild(textarea);
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function renderMeta(data) {
        const validation = data.validation || {};

        metaEl.innerHTML = `
          <strong>Component:</strong> ${escapeHtml(data.component || "")}<br>
          <strong>Type:</strong> ${escapeHtml(data.type || "")}<br>
          <strong>Description:</strong> ${escapeHtml(data.description || "")}<br>
          <strong>Validation:</strong>
          total ${escapeHtml(validation.total || 0)},
          ok ${escapeHtml(validation.ok || 0)},
          review ${escapeHtml(validation.review || 0)},
          wrongCase ${escapeHtml(validation.wrongCase || 0)},
          unknown ${escapeHtml(validation.unknown || 0)}
        `;
      }

      function renderTable(data) {
        const props = data.props || [];

        if (!props.length) {
          tableContainer.innerHTML = '<div class="empty">Пропы не найдены</div>';
          return;
        }

        let html = `
          <table>
            <thead>
              <tr>
                <th>Pixso</th>
                <th>Design</th>
                <th>Code</th>
                <th>Type</th>
                <th>Default</th>
                <th>Status</th>
                <th>Suggestion</th>
              </tr>
            </thead>
            <tbody>
        `;

        props.forEach((prop) => {
          const def = prop.defaultValue ?? "";
          const rowClass = `status-${String(prop.status || "").toLowerCase()}`;

          html += `
            <tr class="${rowClass}">
              <td>${escapeHtml(prop.pixsoName)}</td>
              <td>${escapeHtml(prop.designName)}</td>
              <td>${escapeHtml(prop.codeName)}</td>
              <td>${escapeHtml(prop.type)}</td>
              <td>${escapeHtml(def)}</td>
              <td>${escapeHtml(prop.status)}</td>
              <td>${escapeHtml(prop.suggestedName || "")}</td>
            </tr>
          `;
        });

        html += `
            </tbody>
          </table>
        `;

        tableContainer.innerHTML = html;
      }

      function buildMarkdownTable(props) {
        let table =
          "| Pixso | Design | Code | Type | Default | Status | Suggestion |\\n";
        table +=
          "|------|------|------|------|--------|--------|-----------|\\n";

        props.forEach((prop) => {
          const def = prop.defaultValue ?? "";
          table += `| ${prop.pixsoName} | ${prop.designName} | ${prop.codeName} | ${prop.type} | ${def} | ${prop.status} | ${prop.suggestedName || ""} |\\n`;
        });

        return table;
      }
    </script>
  </body>
</html>
