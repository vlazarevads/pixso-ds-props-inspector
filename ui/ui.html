<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Component Props Inspector</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background: #fff;
        color: #111;
      }

      .app {
        padding: 16px;
      }

      .title {
        margin: 0 0 12px;
        font-size: 18px;
      }

      .actions {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }

      button {
        padding: 8px 10px;
        cursor: pointer;
      }

      .meta {
        font-size: 12px;
        color: #555;
        margin-bottom: 12px;
        line-height: 1.5;
      }

      .table-wrap {
        background: #f4f4f4;
        border-radius: 8px;
        padding: 8px;
        max-height: 320px;
        overflow: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
        background: #fff;
      }

      th,
      td {
        border: 1px solid #ddd;
        padding: 8px;
        vertical-align: top;
        text-align: left;
      }

      th {
        background: #f0f0f0;
        position: sticky;
        top: 0;
        z-index: 1;
      }

      .empty {
        font-size: 12px;
        color: #666;
        padding: 12px;
      }

      .status {
        font-size: 12px;
        color: #666;
        margin-top: 8px;
      }

      .status-review td {
        background: #fff6dd;
      }

      .status-unknown td {
        background: #f2f2f2;
      }

      .status-wrong_case td {
        background: #e7f1ff;
      }
    </style>
  </head>
  <body>
    <div id="app" class="app">
      <h3 class="title">Component Props Inspector</h3>

      <div class="actions">
        <button id="inspectBtn">Проверить компонент</button>
        <button id="copyJsonBtn">Скопировать JSON</button>
        <button id="copyTableBtn">Скопировать таблицу</button>
        <button id="generateDocBtn">Документация по пропам</button>
        <button id="generateFullDocBtn">Сгенерировать полную документацию</button>
        <button id="getKeyBtn">Get key</button>
      </div>

      <div id="meta" class="meta">Нажмите Inspect component</div>

      <div class="table-wrap">
        <div id="tableContainer" class="empty">Таблица пока не построена</div>
      </div>

      <div id="status" class="status"></div>
    </div>

    <div id="loading" style="
      display:none;
      text-align:center;
      padding:40px 20px;
    ">
      <img
        id="loadingGif"
        src ="https://c.tenor.com/aW1paWTKpZMAAAAd/tenor.gif"; 
        style="
          width:90%;
          max-width:800px;
        "
      />

      <div style="
        font-size:13px;
        color:#444;
      ">
        <div id="loadingProgress">Подготовка...</div>
      </div>
    </div>

  </body>
</html>
